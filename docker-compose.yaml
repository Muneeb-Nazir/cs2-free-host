version: '3.8'

services:
  # Web Dashboard
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: cs2-dashboard
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - COOLIFY_API_URL=${COOLIFY_API_URL}
      - COOLIFY_API_TOKEN=${COOLIFY_API_TOKEN}
      - CS2_SERVICE_UUID=${CS2_SERVICE_UUID}
      - PUBLIC_IP=${PUBLIC_IP}
    ports:
      - "3000:3000"
    networks:
      - cs2-network
    depends_on:
      - cs2
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/server/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # CS2 Game Server
  cs2:
    build:
      context: ./cs2-server
      dockerfile: Dockerfile
    container_name: cs2-server
    network_mode: host
    restart: unless-stopped
    environment:
      - CS2_SERVERNAME=${CS2_SERVERNAME:-Coolify CS2}
      - CS2_MAXPLAYERS=${CS2_MAXPLAYERS:-14}
      - CS2_MAP=${CS2_MAP:-de_dust2}
      - CS2_GAMEMODE=${CS2_GAMEMODE:-0}
      - CS2_GAMETYPE=${CS2_GAMETYPE:-0}
      - CS2_TICKRATE=${CS2_TICKRATE:-64}
      - CS2_PW=${CS2_PW:-}
      - CS2_RCONPW=${CS2_RCONPW:-changeme}
      - STEAM_GSLT=${STEAM_GSLT}
      - AUTO_SHUTDOWN=${AUTO_SHUTDOWN:-false}
      - IDLE_TIMEOUT=${IDLE_TIMEOUT:-30}
    volumes:
      - cs2-data:/home/steam/serverfiles
      - cs2-logs:/home/steam/log
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 5G
        reservations:
          cpus: '1.0'
          memory: 2G

networks:
  cs2-network:
    driver: bridge

volumes:
  cs2-data:
    driver: local
  cs2-logs:
    driver: local
